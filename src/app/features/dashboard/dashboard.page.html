<div class="d-flex align-items-start justify-content-between gap-3 flex-wrap">
  <div>
    <div class="text-secondary">Overview</div>
    <h1 class="h4 mb-0">Dashboard</h1>
  </div>
  <div class="d-flex gap-2">
    <button class="btn btn-sm btn-outline-secondary" type="button" disabled>
      <i class="bi bi-download me-1"></i>
      Export (soon)
    </button>
    <button class="btn btn-sm btn-primary" type="button" disabled>
      <i class="bi bi-plus-lg me-1"></i>
      Quick add (soon)
    </button>
  </div>
</div>

<div class="row g-3 mt-1">
  <div class="col-12 col-md-6 col-xl-3">
    <app-stat-card
      label="Total income"
      [value]="asEgp(income())"
      icon="bi-graph-up-arrow"
      tone="success"
      hint="Subscriptions, sponsors, tournaments"
    />
  </div>

  <div class="col-12 col-md-6 col-xl-3">
    <app-stat-card
      label="Total expenses"
      [value]="asEgp(expenses())"
      icon="bi-graph-down-arrow"
      tone="danger"
      hint="Salaries, equipment, rent"
    />
  </div>

  <div class="col-12 col-md-6 col-xl-3">
    <app-stat-card
      label="Net profit"
      [value]="asEgp(netProfit())"
      icon="bi-cash-stack"
      tone="primary"
      hint="Calculated automatically"
    />
  </div>

  <div class="col-12 col-md-6 col-xl-3">
    <app-stat-card
      label="Players / Coaches"
      [value]="playersCount() + ' / ' + coachesCount()"
      icon="bi-people-fill"
      tone="info"
      hint="Active members in the system"
    />
  </div>
</div>

<div class="row g-3 mt-1">
  <div class="col-12 col-xl-8">
    <div class="card erp-panel">
      <div class="card-body">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
          <div class="fw-semibold">Monthly income vs expenses</div>
          <div class="small text-secondary">Dummy 2026 data</div>
        </div>

        <div class="mt-3">
          <app-monthly-income-expense-chart [data]="monthly" />
        </div>
      </div>
    </div>
  </div>

  <div class="col-12 col-xl-4">
    <div class="card erp-panel h-100">
      <div class="card-body">
        <div class="fw-semibold">Recent transactions</div>
        <div class="small text-secondary">Preview of Finance module</div>

        <div class="list-group list-group-flush mt-2">
          <div
            *ngFor="let t of recentTransactions"
            class="list-group-item px-0 d-flex align-items-center justify-content-between gap-3"
          >
            <div class="min-w-0">
              <div class="fw-semibold text-truncate">
                {{ t.category }}
                <span class="badge ms-1" [class]="t.type === 'Income' ? 'text-bg-success-subtle text-success-emphasis' : 'text-bg-danger-subtle text-danger-emphasis'">
                  {{ t.type }}
                </span>
              </div>
              <div class="small text-secondary">{{ t.date }}</div>
            </div>
            <div class="fw-semibold" [class.text-success]="t.type === 'Income'" [class.text-danger]="t.type === 'Expense'">
              {{ t.type === 'Income' ? '+' : '-' }}{{ asEgp(t.amount) }}
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
